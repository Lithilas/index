name: Atnaujinti Renginius

on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# Štai čia duodame robotukui leidimą išsaugoti pakeitimus faile (Ištaiso Error 128)
permissions:
  contents: write 

jobs:
  update-events:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repozitoriją
        uses: actions/checkout@v4 # Atnaujinta į v4 (Ištaiso Node.js įspėjimą)

      - name: Paruošti Python
        uses: actions/setup-python@v5 # Atnaujinta į v5 (Ištaiso Node.js įspėjimą)
        with:
          python-version: '3.x'

      - name: Įdiegti bibliotekas
        run: pip install requests beautifulsoup4

      - name: Paleisti skriptą
        run: python update_events.py

      - name: Išsaugoti (Commit) pakeitimus
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add index.html
          git diff-index --quiet HEAD || git commit -m "Automatinis renginių atnaujinimas iš sratas.lt"
          git push
